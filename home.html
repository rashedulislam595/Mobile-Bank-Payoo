<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome | Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>

<body class="min-h-screen max-w-md bg-base-200  mx-auto shadow-2xl my-12  ">
    <header class="border-b-2 border-gray-300 sticky top-0  bg-base-200 z-20">
        <section class="w-11/12 mx-auto py-4 flex justify-between items-center">
            <div class="left flex gap-1.5">
                <div class="w-14">
                    <img src="./assets/logo.png" alt="">
                </div>
                <!-- balance -->
                <div class="">
                    <h2 class="text-2xl font-bold">$ <span id="balance">20000</span> </h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="./index.html" class="btn btn-soft"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </section>
    </header>
    <!-- payoo content -->
    <section class="w-11/12 mx-auto py-12">
        <!-- content -->
        <div class=" space-y-3">
            <h2 class="text-2xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
            <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and
            </p>
        </div>

        <!-- buttons -->
        <div class="mt-6 grid grid-cols-3 gap-2">
            <button onclick="showOnly('add-money')" class="btn flex-col h-full py-5 rounded-xl btn-secondary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="showOnly('cash-out')" class="btn flex-col h-full py-5  rounded-xl btn-secondary btn-soft">
                <img src="./assets/opt-2.png" alt="">
                <p>Cash Out</p>
            </button>
            <button onclick="showOnly('send-money')" class="btn flex-col h-full py-5  rounded-xl btn-secondary btn-soft">
                <img src="./assets/opt-3.png" alt="">
                <p>Send Money</p>
            </button>
            <button onclick="showOnly('get-bonus')" class="btn flex-col h-full py-5  rounded-xl btn-secondary btn-soft">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button onclick="showOnly('pay-bill')" class="btn flex-col h-full py-5  rounded-xl btn-secondary btn-soft">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button onclick="showOnly('history')" class="btn flex-col h-full py-5  rounded-xl btn-secondary btn-soft">
                <img src="./assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>

    <!-- add money section -->
    <section id="add-money" class="w-11/12 mx-auto hidden">
        <h2 class="text-xl font-bold">Add Money</h2>
        <!-- form -->
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow  mx-auto rounded-2xl">
            <div class="card-body  ">
                <fieldset class="fieldset">
                    <label class="label text-neutral/70 font-medium text-[16px]">Select A Bank</label>
                    <select id="add-money-bank" class="select w-full bg-base-200 rounded-full mt-2">
                        <option disabled selected >Select bank</option>
                        <option value="IDB">IDB</option>
                        <option value="City Bank">City Bank</option>
                        <option value="DDU">DDU</option>
                    </select><br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Bank Account Number</label>
                    <input id="add-money-number-input" type="text" class="input bg-base-200 rounded-full mt-2 w-full" maxlength="11" minlength="11" placeholder="Enter 11 digit account number" />
                    <br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Amount to Add</label>
                    <input id="add-money-amount" type="number" class="input bg-base-200 rounded-full mt-2 w-full" placeholder="Add Amount to withdraw" />
                    <br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Pin Number</label>
                    <input id="add-money-pin" type="password" class="input bg-base-200 rounded-full mt-2 w-full" maxlength="4" minlength="4" placeholder="Enter 4 digit pin " />

                    <button id="add-money-btn" class="btn btn-primary mt-4 text-xl rounded-full ">Add Money</button>
                </fieldset>
            </div>
        </div>
    </section>
    <!-- cash out section -->
    <section id="cash-out" class="w-11/12 mx-auto hidden">
        <h2 class="text-xl font-bold">Cash Out</h2>
        <!-- form -->
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow  mx-auto rounded-2xl">
            <div class="card-body  ">
                <fieldset class="fieldset">
                    <label class="label text-neutral/70 font-medium text-[16px]">Agent Number</label>
                    <input id="cashout-input" type="text" class="input bg-base-200 rounded-full mt-2 w-full"
                        maxlength="11" minlength="11" placeholder="Enter 11 digit number" />
                    <br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Amount</label>
                    <input id="cashout-amount" type="number" class="input bg-base-200 rounded-full mt-2 w-full"
                        placeholder="Enter amount to withdraw" />
                    <br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Pin Number</label>
                    <input id="cashout-pin" type="password" class="input bg-base-200 rounded-full mt-2 w-full"
                        maxlength="4" minlength="4" placeholder="Enter 4 digit pin " />

                    <button id="cashout-btn" class="btn btn-primary mt-4 text-xl rounded-full ">Withdraw Money</button>
                </fieldset>
            </div>
        </div>
    </section>

    <!-- transfer money -->
    <section id="send-money" class="w-11/12 mx-auto  hidden">
        <h2 class="text-xl font-bold">Transfer Money</h2>
        <!-- form -->
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow  mx-auto rounded-2xl">
            <div class="card-body  ">
                <fieldset class="fieldset">
                    <label class="label text-neutral/70 font-medium text-[16px]">User Account Number</label>
                    <input id="send-money-number-input" type="text" class="input bg-base-200 rounded-full mt-2 w-full" maxlength="11" minlength="11" placeholder="Enter 11 digit number" />
                    <br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Amount</label>
                    <input id="send-money-amount" type="number" class="input bg-base-200 rounded-full mt-2 w-full" placeholder="Enter amount to transfer" />
                    <br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Pin Number</label>
                    <input id="send-money-pin" type="password" class="input bg-base-200 rounded-full mt-2 w-full" maxlength="4" minlength="4" placeholder="Enter 4 digit pin number" />

                    <button id="send-money-btn" class="btn btn-primary mt-4 text-xl rounded-full ">Send Now</button>
                </fieldset>
            </div>
        </div>
    </section>

    <!-- pay Bill -->
    <section id="pay-bill" class="w-11/12 mx-auto hidden">
        <h2 class="text-xl font-bold">Pay Bill</h2>
        <!-- form -->
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow  mx-auto rounded-2xl">
            <div class="card-body  ">
                <fieldset class="fieldset">
                    <label class="label text-neutral/70 font-medium text-[16px]">Select To Pay</label>
                    <select id="pay-bill-bank" class="select w-full bg-base-200 rounded-full mt-2">
                        <option disabled selected >Select bank</option>
                        <option value="IDB">IDB</option>
                        <option value="City Bank">City Bank</option>
                        <option value="DDU">DDU</option>
                    </select><br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Biller Account Number</label>
                    <input id="pay-bill-number-input" type="text" class="input bg-base-200 rounded-full mt-2 w-full" maxlength="11" minlength="11" placeholder="Enter account number" />
                    <br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Amount to Pay</label>
                    <input id="pay-bill-amount" type="number" class="input bg-base-200 rounded-full mt-2 w-full" placeholder="Add Amount to pay" />
                    <br>

                    <label class="label text-neutral/70 font-medium text-[16px]">Pin Number</label>
                    <input id="pay-bill-pin" type="password" class="input bg-base-200 rounded-full mt-2 w-full" maxlength="4" minlength="4" placeholder="Enter 4 digit pin number" />

                    <button id="pay-bill-btn" class="btn btn-primary mt-4 text-xl rounded-full ">Add Money</button>
                </fieldset>
            </div>
        </div>
    </section>

    <!-- Get Bonus -->
    <section id="get-bonus" class="w-11/12 mx-auto hidden">
        <h2 class="text-xl font-bold">Get Bonus</h2>
        <!-- form -->
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow  mx-auto rounded-2xl">
            <div class="card-body  ">
                <fieldset class="fieldset">
                    <label class="label text-neutral/70 font-medium text-[16px]">Enter Bonus Coupon</label>
                    <input id="get-bonus-coupon-input" type="text" class="input bg-base-200 rounded-full mt-2 w-full" placeholder="Enter your coupon" />
                    <br>

                    <button id="get-bonus-btn" class="btn btn-primary mt-4 text-xl rounded-full ">Get Bonus</button>
                </fieldset>
            </div>
        </div>
    </section>

    <!-- transaction -->
     <section id="history" class="w-11/12 mx-auto hidden">
        <h2 class="text-xl font-bold mb-4">Transactions</h2>
        <div id="history-container">
        </div>
     </section>

    <script src="script/machine.js"></script>
    <script src="script/addMoney.js"></script>
    <script src="script/sendMoney.js"></script>
    <script src="script/payBill.js"></script>
    <script src="script/getBonus.js"></script>
    <script src="script/cashout.js"></script>
</body>

</html>
